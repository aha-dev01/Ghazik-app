<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات المتجر - Sawa Digital Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063185.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        body { background: #eef2f7; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; max-width: 500px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h3 { text-align: center; color: #34495e; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { font-size: 14px; color: #666; margin-bottom: 5px; display: block; }
        input, textarea { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        
        .whatsapp-wrapper { display: flex; align-items: center; background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 0 15px; }
        .whatsapp-wrapper input { border: none !important; padding: 12px 0 !important; flex: 1; }
        .whatsapp-wrapper i { color: #25D366; font-size: 20px; margin-right: 10px; }
        
        .btn-save { background: #34495e; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-save:hover { background: #2c3e50; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
        
        /* تنسيق الخريطة المصغرة */
        #mapPreview { margin-top: 10px; display: none; border-radius: 10px; overflow: hidden; height: 180px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="card">
        <h3>⚙️ إعدادات المتجر</h3>
        
        <div class="input-group">
            <label>اسم المتجر</label>
            <input type="text" id="shopName" placeholder="اسم المحل التجاري">
        </div>

        <div class="input-group">
            <label>رقم الواتساب</label>
            <div class="whatsapp-wrapper">
                <input type="tel" id="whatsappNumber" placeholder="رقم الواتساب للتواصل">
                <i class="fab fa-whatsapp"></i>
            </div>
        </div>

        <div class="input-group">
            <label>رابط خرائط جوجل</label>
            <input type="text" id="mapLink" placeholder="الرابط (يجب أن يكون رابط مشاركة)" oninput="updateMapPreview()">
        </div>
        
        <div id="mapPreview">
            <iframe id="mapFrame" width="100%" height="100%" frameborder="0" style="border:0"></iframe>
        </div>

        <div class="input-group" style="margin-top: 15px;">
            <label>العنوان المختصر</label>
            <textarea id="mapDesc" placeholder="وصف مكان المحل..." rows="3"></textarea>
        </div>

        <button class="btn-save" onclick="saveSettings()">حفظ التعديلات</button>
        <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD8FIOQZObnxknxSG9OzFMjaMQUBSBMNUQ", authDomain: "gastracker-41f9e.firebaseapp.com", projectId: "gastracker-41f9e", storageBucket: "gastracker-41f9e.firebasestorage.app", messagingSenderId: "921863849230", appId: "1:921863849230:web:188b5e09c18b9994e2035f" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection("distributors").doc(user.uid).get().then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('shopName').value = data.shopName || '';
                        document.getElementById('whatsappNumber').value = data.whatsappNumber || '';
                        document.getElementById('mapLink').value = data.mapLink || '';
                        document.getElementById('mapDesc').value = data.mapDesc || '';
                        updateMapPreview(); // تحديث الخريطة عند التحميل
                    }
                });
            } else { window.location.href = 'index.html'; }
        });

        function updateMapPreview() {
            const link = document.getElementById('mapLink').value;
            const preview = document.getElementById('mapPreview');
            const frame = document.getElementById('mapFrame');
            
            // محاولة اكتشاف رابط خرائط جوجل وتحويله لـ Embed
            if (link.includes('google.com/maps')) {
                // ملاحظة: لتحويل رابط الخرائط العادي لـ Embed، نحتاج لرابط يحتوي على /place/ أو /search/
                // هنا نقوم بوضع الرابط في الـ iframe مباشرة إذا كان رابطاً صحيحاً
                frame.src = link; 
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }

        async function saveSettings() {
            const user = auth.currentUser;
            if (!user) return;
            
            Swal.fire({ title: 'جاري الحفظ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                await db.collection("distributors").doc(user.uid).set({
                    shopName: document.getElementById('shopName').value,
                    whatsappNumber: document.getElementById('whatsappNumber').value,
                    mapLink: document.getElementById('mapLink').value,
                    mapDesc: document.getElementById('mapDesc').value
                }, { merge: true });
                
                Swal.fire('تم الحفظ!', 'تم تحديث بيانات متجرك بنجاح.', 'success').then(() => { 
                    window.location.href = 'dashboard.html'; 
                });
            } catch (error) { 
                Swal.fire('خطأ', 'تعذر حفظ البيانات: ' + error.message, 'error'); 
            }
        }
    </script>
</body>
</html>
