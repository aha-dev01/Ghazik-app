<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات المتجر - Sawa Digital Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        body { background: #eef2f7; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; max-width: 500px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h3 { text-align: center; color: #34495e; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 14px; color: #666; margin-bottom: 5px; display: block; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-save { background: #34495e; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
        .info-box { background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px dashed #cbd5e1; font-size: 12px; color: #64748b; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>⚙️ إعدادات المتجر</h3>
        
        <div class="input-group">
            <label>اسم المتجر</label>
            <input type="text" id="shopName" placeholder="اسم المحل التجاري">
        </div>

        <div class="input-group">
            <label>رقم الواتساب (مثال: 249912345678+)</label>
            <input type="tel" id="whatsappNumber" placeholder="رقم الواتساب للتواصل">
        </div>

        <div class="input-group">
            <label>رابط موقعك على الخريطة</label>
            <input type="text" id="mapLink" placeholder="انسخ الرابط من خرائط جوجل">
            <div class="info-box">
                <i class="fas fa-info-circle"></i> انسخ رابط "مشاركة الموقع" من تطبيق خرائط جوجل، وسيظهر لعملائك كزر مباشر لفتح الموقع.
            </div>
        </div>

        <div class="input-group">
            <label>العنوان المختصر</label>
            <textarea id="mapDesc" placeholder="مثال: الخرطوم - شارع النيل..." rows="2"></textarea>
        </div>

        <button class="btn-save" onclick="saveSettings()">حفظ التعديلات</button>
        <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD8FIOQZObnxknxSG9OzFMjaMQUBSBMNUQ", authDomain: "gastracker-41f9e.firebaseapp.com", projectId: "gastracker-41f9e", storageBucket: "gastracker-41f9e.firebasestorage.app", messagingSenderId: "921863849230", appId: "1:921863849230:web:188b5e09c18b9994e2035f" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); 
    const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection("distributors").doc(user.uid).get().then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('shopName').value = data.shopName || '';
                        document.getElementById('whatsappNumber').value = data.whatsappNumber || '';
                        document.getElementById('mapLink').value = data.mapLink || '';
                        document.getElementById('mapDesc').value = data.mapDesc || '';
                    }
                });
            } else { window.location.href = 'index.html'; }
        });

        async function saveSettings() {
            const user = auth.currentUser;
            if (!user) return;
            
            Swal.fire({ title: 'جاري الحفظ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                await db.collection("distributors").doc(user.uid).set({
                    shopName: document.getElementById('shopName').value,
                    whatsappNumber: document.getElementById('whatsappNumber').value,
                    mapLink: document.getElementById('mapLink').value,
                    mapDesc: document.getElementById('mapDesc').value
                }, { merge: true });
                
                Swal.fire('تم الحفظ!', 'تم تحديث البيانات بنجاح.', 'success').then(() => { 
                    window.location.href = 'dashboard.html'; 
                });
            } catch (error) { 
                Swal.fire('خطأ', 'تعذر حفظ البيانات', 'error'); 
            }
        }
    </script>
</body>
</html>
