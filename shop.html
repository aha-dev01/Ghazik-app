<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المتجر | غازك</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest22.json">
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/xTYXZBgx/1782116091880.png">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; padding: 20px; color: #334155; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn { display: block; padding: 14px; border-radius: 12px; text-align: center; color: white; text-decoration: none; font-weight: bold; margin-bottom: 10px; font-size: 16px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }
        h1 { margin: 0; font-size: 20px; }
        h3 { margin-top: 25px; }
        /* تنسيق الصورة الدائرية */
        .shop-logo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 4px solid #e67e22; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.2); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container" id="shopDetails">
    <div class="card" style="text-align:center;">جاري تحميل بيانات المتجر...</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD8FIOQZObnxknxSG9OzFMjaMQUBSBMNUQ", authDomain: "gastracker-41f9e.firebaseapp.com", projectId: "gastracker-41f9e", storageBucket: "gastracker-41f9e.firebasestorage.app", messagingSenderId: "921863849230", appId: "1:921863849230:web:188b5e09c18b9994e2035f" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const shopId = new URLSearchParams(window.location.search).get('id');

    db.collection("distributors").doc(shopId).get().then(doc => {
        if (!doc.exists) {
            document.getElementById('shopDetails').innerHTML = '<div class="card">المتجر غير موجود</div>';
            return;
        }
        const d = doc.data();
        
        // عرض الصورة إذا كانت موجودة، وإلا عرض الأيقونة الافتراضية
        const logoElement = d.shopLogo 
            ? `<img src="${d.shopLogo}" class="shop-logo">` 
            : `<div style="background:#e67e22; color:white; width:90px; height:90px; display:flex; align-items:center; justify-content:center; border-radius:50%; margin:0 auto 10px auto; font-size:30px;"><i class="fas fa-fire"></i></div>`;

        let html = `
            <div class="card" style="text-align:center;">
                ${logoElement}
                <h1>${d.shopName}</h1>
                <p style="margin: 10px 0; color: #64748b;"><i class="fas fa-map-marker-alt"></i> ${d.mapDesc || 'لا يوجد عنوان'}</p>
                <div style="display:grid; gap:10px;">
                    <a href="${d.mapLink}" target="_blank" class="btn" style="background:#3b82f6;">الوصول عبر الخريطة</a>
                    <a href="https://wa.me/${d.whatsappNumber}" target="_blank" class="btn" style="background:#25d366;">طلب عبر واتساب</a>
                </div>
            </div>
            <h3>المخزون المتوفر:</h3>`;
        
        db.collection("gas_inventory").where("distributorId", "==", shopId).onSnapshot(snap => {
            if (snap.empty) {
                document.getElementById('shopDetails').innerHTML = html + '<p>لا يوجد مخزون حالياً</p>';
                return;
            }
            
            const items = snap.docs.map(doc => {
                const i = doc.data();
                const statusColors = {
                    'متوفر': { bg: '#dcfce7', text: '#166534' },
                    'قليل': { bg: '#fef3c7', text: '#92400e' },
                    'غير متوفر': { bg: '#f1f5f9', text: '#475569' }
                };
                const color = statusColors[i.status] || statusColors['غير متوفر'];

                return `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b style="display:block; font-size:16px;">${i.cylinderType}</b>
                            <span style="font-size:10px; color:#94a3b8;">تحديث: ${i.lastUpdated || 'منذ فترة'}</span>
                        </div>
                        <div style="text-align:left;">
                            <div style="color:#f97316; font-weight:bold; font-size:15px; margin-bottom:5px;">${i.price} ج.س</div>
                            <span style="font-size:11px; background:${color.bg}; color:${color.text}; padding:4px 10px; border-radius:10px; font-weight:bold;">
                                ${i.status}
                            </span>
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('shopDetails').innerHTML = html + items;
        });
    });
</script>
</body>
</html>
