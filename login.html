<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول | غازك</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/JhNMNF8Y/1782113129362.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #f97316; --secondary: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #f0f2f5 0%, #d9e2ec 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); width: 100%; max-width: 400px; text-align: center; }
        
        .input-group { position: relative; margin-bottom: 18px; }
        input { width: 100%; padding: 16px 50px 16px 45px; border: 2px solid #e2e8f0; border-radius: 16px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); }
        .field-icon { position: absolute; right: 20px; top: 18px; color: #94a3b8; }
        .toggle-password { position: absolute; left: 20px; top: 18px; color: #94a3b8; cursor: pointer; z-index: 10; }
        
        button { width: 100%; padding: 16px; background: var(--secondary); color: white; border: none; border-radius: 16px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #334155; transform: translateY(-2px); }
        
        .footer-text { margin-top: 30px; font-size: 12px; color: #94a3b8; font-weight: 600; }
        .custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #c0392b; color: white; padding: 15px 25px; border-radius: 15px; display: none; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

<div id="customAlert" class="custom-alert"></div>

<div class="card">
    <div style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"><i class="fas fa-sign-in-alt"></i></div>
    <h2 style="color: var(--secondary); margin-bottom: 25px;">تسجيل الدخول</h2>

    <div class="input-group">
        <i class="fas fa-envelope field-icon"></i>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
    </div>
    <div class="input-group">
        <i class="fas fa-lock field-icon"></i>
        <input type="password" id="password" placeholder="كلمة المرور">
        <i class="fas fa-eye toggle-password" onclick="togglePass('password', this)"></i>
    </div>

    <div style="text-align: left; margin-bottom: 20px;">
        <a href="#" onclick="resetPassword()" style="color: #64748b; font-size: 13px; font-weight: bold; text-decoration: none;">هل نسيت كلمة المرور؟</a>
    </div>

    <button id="loginBtn" onclick="login()">دخول</button>

    <div style="margin-top: 20px; font-size: 14px; color: #64748b;">
        ليس لديك حساب؟ <a href="regist.html" style="color: var(--primary); font-weight: bold; text-decoration: none;">سجل الآن</a>
    </div>
    
    <div class="footer-text">سوا للحلول الرقمية | Sawa Digital Solutions</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD8FIOQZObnxknxSG9OzFMjaMQUBSBMNUQ", authDomain: "gastracker-41f9e.firebaseapp.com", projectId: "gastracker-41f9e", storageBucket: "gastracker-41f9e.firebasestorage.app", messagingSenderId: "921863849230", appId: "1:921863849230:web:188b5e09c18b9994e2035f" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function showMessage(msg, color = "#c0392b") {
        const alertBox = document.getElementById('customAlert');
        alertBox.innerText = msg;
        alertBox.style.backgroundColor = color;
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
    }

    function togglePass(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');

        if (!email || !password) return showMessage("⚠️ يرجى ملء جميع الحقول");

        btn.disabled = true;
        btn.innerText = "جاري التحقق...";

        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const uid = userCredential.user.uid;

            // التحقق من التاجر أولاً
            const merchantDoc = await db.collection("distributors").doc(uid).get();
            // التحقق من الزبون
            const customerDoc = await db.collection("customers").doc(uid).get();
            
            if (merchantDoc.exists) {
                window.location.href = 'dashboard.html';
            } else if (customerDoc.exists) {
                window.location.href = 'view.html';
            } else {
                throw new Error("بيانات المستخدم غير موجودة");
            }
        } catch (error) {
            btn.disabled = false;
            btn.innerText = "دخول";
            showMessage("❌ خطأ: " + error.message);
        }
    }

    function resetPassword() {
        const email = document.getElementById('email').value.trim();
        if (!email) return showMessage("⚠️ أدخل البريد الإلكتروني أولاً");
        auth.sendPasswordResetEmail(email)
            .then(() => showMessage("✅ تم إرسال رابط الاستعادة للبريد", "#27ae60"))
            .catch(err => showMessage("❌ خطأ: " + err.message));
    }
</script>
</body>
</html>
