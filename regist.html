<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل متجرك - Ghazik</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/xTYXZBgx/1782116091880.png">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { background: linear-gradient(135deg, #f0f2f5 0%, #d9e2ec 100%); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); width: 90%; max-width: 450px; text-align: center; }
        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 15px 45px; border: 1px solid #e1e1e1; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #ffffff; text-align: right; }
        .field-icon { position: absolute; right: 15px; top: 18px; color: #888; pointer-events: none; }
        .toggle-password { position: absolute; left: 15px; top: 18px; cursor: pointer; color: #888; z-index: 10; padding: 0 5px; }
        button { width: 100%; padding: 16px; background: #1a1a2e; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover:not(:disabled) { background: #252545; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        .error-message { color: #ef4444; font-size: 13px; margin-top: -15px; margin-bottom: 10px; text-align: right; display: none; }
        .footer-text { margin-top: 20px; color: #e67e22; font-size: 13px; font-weight: 500; }
        .custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #c0392b; color: white; padding: 15px 25px; border-radius: 10px; display: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-weight: bold; }
    </style>
</head>
<body>

<div id="customAlert" class="custom-alert">
    <span id="alertText"></span>
</div>

<div class="card">
    <div style="font-size: 45px; color: #e67e22; margin-bottom: 15px;"><i class="fas fa-fire"></i></div>
    <h2>انضم لشبكة الموزعين</h2>
    <form id="dealerForm">
        <div class="input-group">
            <i class="fas fa-store field-icon"></i>
            <input type="text" id="shopName" placeholder="اسم المحل التجاري" required>
        </div>
        <div class="input-group">
            <i class="fas fa-envelope field-icon"></i>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <i class="fas fa-eye toggle-password" onclick="togglePass('password', this)"></i>
        </div>
        <div class="input-group">
            <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required>
            <i class="fas fa-eye toggle-password" onclick="togglePass('confirmPassword', this)"></i>
        </div>
        <div id="passwordError" class="error-message">كلمات المرور غير متطابقة</div>
        <button type="submit" id="regBtn">تفعيل المحل الآن</button>
    </form>

    <div style="margin-top: 15px; font-size: 14px;">
        لديك حساب بالفعل؟ <a href="login.html" style="color: #c0392b; font-weight: bold; text-decoration: none;">سجل دخولك هنا</a>
    </div>
    <div class="footer-text">شركة سوا للحلول الرقمية | Sawa Digital Solutions</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyD8FIOQZObnxknxSG9OzFMjaMQUBSBMNUQ",
      authDomain: "gastracker-41f9e.firebaseapp.com",
      projectId: "gastracker-41f9e",
      storageBucket: "gastracker-41f9e.firebasestorage.app",
      messagingSenderId: "921863849230",
      appId: "1:921863849230:web:188b5e09c18b9994e2035f"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    function showMessage(msg) {
        const alertBox = document.getElementById('customAlert');
        document.getElementById('alertText').innerText = msg;
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
    }

    function togglePass(id, icon) {
        const input = document.getElementById(id);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    document.getElementById('dealerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const shopName = document.getElementById('shopName').value;
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('regBtn');
        
        if (pass !== document.getElementById('confirmPassword').value) {
            document.getElementById('passwordError').style.display = 'block';
            return;
        }

        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التسجيل...';
        btn.disabled = true;

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection("distributors").doc(userCredential.user.uid).set({
                shopName: shopName,
                email: email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            window.location.href = 'login.html';
        } catch (error) {
            btn.innerHTML = 'تفعيل المحل الآن';
            btn.disabled = false;
            
            let errMsg = "خطأ: " + error.message;
            if (error.code === 'auth/email-already-in-use') errMsg = "⚠️ هذا البريد الإلكتروني مستخدم مسبقاً.";
            else if (error.code === 'auth/weak-password') errMsg = "⚠️ كلمة المرور ضعيفة جداً.";
            
            showMessage(errMsg);
        }
    });
</script>
</body>
</html>
