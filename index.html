    <style>
        :root { --primary: #f97316; --secondary: #1e293b; --bg: #f1f5f9; }

        p { color: #64748b; margin-bottom: 35px; line-height: 1.6; font-size: 16px; }
        
        .btn { display: block; width: 100%; padding: 16px; margin: 12px 0; border-radius: 16px; font-weight: bold; text-decoration: none; transition: all 0.3s ease; box-sizing: border-box; font-size: 16px; }
        .btn-login { background: var(--secondary); color: white; }
        .btn-login:hover { background: #334155; transform: translateY(-2px); }
        .btn-reg { background: transparent; color: var(--secondary); border: 2px solid var(--secondary); }
        .btn-reg:hover { background: var(--secondary); color: white; transform: translateY(-2px); }
        
        .footer-text { margin-top: 40px; font-size: 12px; color: #94a3b8; font-weight: 600; }
