<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Sawa Digital Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/JhNMNF8Y/1782113129362.png">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #eef2f7; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .header-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .top-nav { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; padding: 0 5px; }
        .top-nav a { color: #64748b; text-decoration: none; transition: 0.3s; }
        
        /* تحديث شريط الحالة ليكون أكثر بروزاً ومقروئية */
        .status-bar { background: white; padding: 14px 10px; border-radius: 14px; margin-bottom: 15px; display: flex; gap: 10px; box-shadow: 0 3px 6px rgba(0,0,0,0.06); }
        .status-col { flex: 1; display: flex; justify-content: space-between; align-items: center; padding: 0 4px; }
        .status-col:first-child { border-left: 2px solid #f1f5f9; padding-left: 10px; } 
        
        /* تكبير حجم الخط وإضافة الأيقونات */
        .status-info { font-size: 14px; color: #34495e; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .status-info b { font-size: 14px; }
        
        /* تحسين الأزرار لتصبح مريحة للضغط واللمس */
        .status-btn { border: none; background: #f1f5f9; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        .status-btn:hover { background: #cbd5e1; }

        .main-header { display: flex; align-items: center; justify-content: space-between; background: white; padding: 12px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .shop-info { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .icon-box { background: #e67e22; color: white; min-width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .option { padding: 10px; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; text-align: center; font-size: 13px; transition: 0.3s; }
        .option:has(input:checked) { background: #34495e; color: white; border-color: #34495e; }
        .option input { display: none; }
        input[type="number"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-add { width: 100%; padding: 12px; background: #34495e; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-share { width: 100%; padding: 12px; background: #22c55e; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .stock-item { background: #fff; padding: 16px; border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #e2e8f0; }
        .type-badge { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 8px; }
        .status-badge { font-weight: bold; font-size: 11px; padding: 4px 10px; border-radius: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-section">
        <div class="top-nav">
            <a href="about.html"><i class="fas fa-info-circle"></i> حول التطبيق</a>
            <a href="contact.html"><i class="fas fa-headset"></i> الدعم الفني</a>
        </div>
        <div class="main-header">
            <div class="shop-info">
                <div class="icon-box"><i class="fas fa-fire fa-lg"></i></div>
                <h2 id="name" style="margin:0; font-size: 16px; color: #34495e;">جاري التحميل...</h2>
            </div>
            <div class="header-actions" style="display: flex; gap: 15px; align-items: center;">
                <button onclick="viewPage()" style="background:none; border:none; color:#2980b9; cursor:pointer;"><i class="fas fa-external-link-alt fa-lg"></i></button>
                <a href="settings.html" style="color: #34495e;"><i class="fas fa-cog fa-lg"></i></a>
                <button onclick="logout()" style="background:none; border:none; color:#c0392b; cursor:pointer;"><i class="fas fa-sign-out-alt fa-lg"></i></button>
            </div>
        </div>
    </div>

    <!-- شريط الحالة المطور والمقروء بالكامل في سطر واحد -->
    <div class="status-bar">
        <!-- القسم الأول: حالة المتجر (أيقونة المتجر) -->
        <div class="status-col">
            <span class="status-info"><i class="fas fa-store"></i> <b id="statusDisplay">مفتوح</b></span>
            <button id="holidayBtn" class="status-btn" onclick="toggleHoliday()">إغلاق</button>
        </div>
        
        <!-- القسم الثاني: حالة التوصيل (أيقونة الشاحنة) -->
        <div class="status-col">
            <span class="status-info"><i class="fas fa-truck"></i> <b id="deliveryDisplay">غير متاح</b></span>
            <button id="deliveryBtn" class="status-btn" onclick="toggleDelivery()">تفعيل</button>
        </div>
    </div>
    
    <div class="card">
        <h3>إضافة / تحديث أسطوانة</h3>
        <div class="grid">
            <label class="option"><input type="radio" name="gasType" value="غاز أمان" checked> غاز أمان</label>
            <label class="option"><input type="radio" name="gasType" value="غاز الوطنية"> غاز الوطنية</label>
            <label class="option"><input type="radio" name="gasType" value="غاز النحلة"> غاز النحلة</label>
            <label class="option"><input type="radio" name="gasType" value="غاز النيل"> غاز النيل</label>
            <label class="option"><input type="radio" name="gasType" value="غاز أبرسي"> غاز أبرسي</label>
            <label class="option"><input type="radio" name="gasType" value="غاز إيران"> غاز إيران</label>
            <label class="option"><input type="radio" name="gasType" value="غاز قادرة"> غاز قادرة</label>
            <label class="option"><input type="radio" name="gasType" value="غاز سوداغاز"> غاز سوداغاز</label>
        </div>
        <input type="number" id="gasPrice" placeholder="السعر (ج.س)">
        <div class="status-grid">
            <label class="option"><input type="radio" name="gasStatus" value="متوفر" checked> متوفر</label>
            <label class="option"><input type="radio" name="gasStatus" value="قليل"> قليل</label>
            <label class="option"><input type="radio" name="gasStatus" value="غير متوفر"> غير متوفر</label>
        </div>
        <button class="btn-add" onclick="addItem()">حفظ التعديلات</button>
        <button class="btn-share" onclick="shareToWhatsApp()"><i class="fab fa-whatsapp"></i> مشاركة القائمة</button>
    </div>
    
    <div class="card">
        <h3>المخزون الحالي</h3>
        <div id="stockList"></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD8FIOQZObnxknxSG9OzFMjaMQUBSBMNUQ", authDomain: "gastracker-41f9e.firebaseapp.com", projectId: "gastracker-41f9e", storageBucket: "gastracker-41f9e.firebasestorage.app", messagingSenderId: "921863849230", appId: "1:921863849230:web:188b5e09c18b9994e2035f" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const db = firebase.firestore();

    function getTypeColor(type) {
        const colors = { "غاز أمان": "#e74c3c", "غاز الوطنية": "#3498db", "غاز النيل": "#2ecc71", "غاز أبرسي": "#f1c40f", "غاز إيران": "#9b59b6", "غاز قادرة": "#e67e22", "غاز سوداغاز": "#34495e" };
        return colors[type] || "#95a5a6";
    }

    function viewPage() { if(auth.currentUser) window.open(`view.html?id=${auth.currentUser.uid}`, '_blank'); }

    auth.onAuthStateChanged((user) => {
        if (user) {
            db.collection("distributors").doc(user.uid).onSnapshot(doc => {
                const data = doc.data();
                document.getElementById('name').innerText = data.name;
                
                // 1. تحديث وعرض حالة المتجر المفتوح/المغلق
                const isClosed = data.isClosed || false;
                document.getElementById('statusDisplay').innerText = isClosed ? 'مغلق' : 'مفتوح';
                document.getElementById('holidayBtn').innerText = isClosed ? 'فتح' : 'إغلاق';
                document.getElementById('statusDisplay').style.color = isClosed ? '#e74c3c' : '#22c55e';

                // 2. تحديث وعرض حالة التوصيل العامة للمحل ككل
                const deliveryAvailable = data.deliveryAvailable || false;
                document.getElementById('deliveryDisplay').innerText = deliveryAvailable ? 'متاح' : 'غير متاح';
                document.getElementById('deliveryBtn').innerText = deliveryAvailable ? 'تعطيل' : 'تفعيل';
                document.getElementById('deliveryDisplay').style.color = deliveryAvailable ? '#0284c7' : '#64748b';
            });
            loadStock();
        } else { window.location.href = 'index.html'; }
    });

    async function toggleHoliday() {
        const user = auth.currentUser;
        const docRef = db.collection("distributors").doc(user.uid);
        const doc = await docRef.get();
        await docRef.update({ isClosed: !(doc.data().isClosed || false) });
    }

    async function toggleDelivery() {
        const user = auth.currentUser;
        if (!user) return;
        const docRef = db.collection("distributors").doc(user.uid);
        const doc = await docRef.get();
        const currentStatus = doc.data().deliveryAvailable || false;
        await docRef.update({ deliveryAvailable: !currentStatus });
    }

    async function addItem() {
        const type = document.querySelector('input[name="gasType"]:checked').value;
        const priceInput = document.getElementById('gasPrice').value;
        const status = document.querySelector('input[name="gasStatus"]:checked').value;
        const now = new Date().toISOString(); 
        
        if (!priceInput) return Swal.fire('تنبيه', 'الرجاء إدخال السعر', 'warning');
        
        const q = await db.collection("gas_inventory").where("distributorId", "==", auth.currentUser.uid).where("cylinderType", "==", type).get();
        if (!q.empty) { await q.docs[0].ref.update({ price: parseInt(priceInput), status: status, lastUpdated: now }); }
        else { await db.collection("gas_inventory").add({ distributorId: auth.currentUser.uid, cylinderType: type, price: parseInt(priceInput), status: status, lastUpdated: now }); }
        
        await db.collection("distributors").doc(auth.currentUser.uid).update({ updatedAt: now });
        
        document.getElementById('gasPrice').value = "";
        Swal.fire('تم الحفظ!', 'تم تحديث البيانات وترتيب المتجر بنجاح', 'success');
    }

    function loadStock() {
        db.collection("gas_inventory").where("distributorId", "==", auth.currentUser.uid).onSnapshot(snapshot => {
            document.getElementById('stockList').innerHTML = snapshot.docs.map(doc => {
                const item = doc.data();
                const color = getTypeColor(item.cylinderType);
                const statusColor = item.status === 'متوفر' ? '#dcfce7' : (item.status === 'قليل' ? '#fef3c7' : '#fee2e2');
                const statusText = item.status === 'متوفر' ? '#166534' : (item.status === 'قليل' ? '#92400e' : '#991b1b');
                return `<div class="stock-item">
                    <div style="display:flex; align-items:center;">
                        <span class="type-badge" style="background:${color}"></span>
                        <div><strong style="color:${color}">${item.cylinderType}</strong><div style="font-weight:bold; color:#1e293b;">${item.price} ج.س</div></div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span class="status-badge" style="background:${statusColor}; color:${statusText}">${item.status}</span>
                        <i class="fas fa-trash-alt" style="color:#c0392b; cursor:pointer;" onclick="deleteItem('${doc.id}')"></i>
                    </div>
                </div>`;
            }).join('');
        });
    }

    async function deleteItem(docId) {
        const result = await Swal.fire({ title: 'هل أنت متأكد؟', icon: 'warning', showCancelButton: true });
        if (result.isConfirmed) { await db.collection("gas_inventory").doc(docId).delete(); }
    }

    function logout() { auth.signOut().then(() => window.location.href = 'index.html'); }
    function shareToWhatsApp() { 
        window.open(`https://wa.me/?text=مرحباً، تابعوا أسعارنا عبر الرابط: ${window.location.origin}/view.html?id=${auth.currentUser.uid}`, '_blank'); 
    }
</script>
</body>
</html>
